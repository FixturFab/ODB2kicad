pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp wasm/demo/index.html public/
    - cp wasm/dist/odb2kicad_wasm.mjs public/
    - cp wasm/dist/odb2kicad_wasm.wasm public/
    - cp samples/test-odb.tgz public/
    - cd wasm && npm pack && cp odb2kicad-wasm-*.tgz ../public/odb2kicad-wasm.tgz && cd ..
  artifacts:
    paths:
      - public
  only:
    - master
    - main
